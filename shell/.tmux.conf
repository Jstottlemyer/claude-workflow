# Prefix: Ctrl-a (easier than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse support (scrolling, pane selection, resizing)
set -g mouse on

# Copy to macOS clipboard: select with mouse, then copy with prefix+y
# Or use Option+click-drag to bypass tmux and select normally
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Use vi keys in copy mode (prefix+[ to enter, q to exit)
setw -g mode-keys vi

# Preserve terminal colors + true color
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Longer scrollback
set -g history-limit 50000

# Faster key repetition
set -s escape-time 0

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar — inherit terminal bg, no background highlights
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=default]%H:%M "
set -g window-status-current-style "fg=cyan,bold,underscore"
set -g window-status-style "fg=default,dim"

# Pane borders — subtle inactive, visible active
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=cyan"

# Never set background colors — inherit everything from Terminal.app
set -g window-style "bg=default,fg=default"
set -g window-active-style "bg=default,fg=default"

# Selection/copy mode — fg-only styling to avoid highlight blobs
set -g mode-style "fg=cyan,bold,reverse"

# Message bar — no background color
set -g message-style "fg=cyan,bold,bg=default"
set -g message-command-style "fg=cyan,bg=default"
